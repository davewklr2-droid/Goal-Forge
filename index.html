<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalForge - Football Training Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
            min-height: screen;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        header {
            border-bottom: 1px solid #1e293b;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .container {
            max-width: 896px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .header-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background-color: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #34d399, #5eead4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        nav { display: flex; gap: 24px; }
        nav a {
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s;
        }
        nav a:hover, nav a.active { color: #34d399; }
        
        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 64px 0;
        }
        .hero { text-align: center; max-width: 672px; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 9999px;
            padding: 6px 16px;
            margin-bottom: 24px;
        }
        .badge-dot {
            width: 8px;
            height: 8px;
            background-color: #34d399;
            border-radius: 50%;
        }
        .badge-text {
            font-size: 12px;
            font-weight: 600;
            color: #34d399;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        h1 {
            font-size: 40px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }
        .hero p {
            font-size: 18px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 40px;
        }
